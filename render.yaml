services:
  - type: web
    name: spy-options-bridge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BROKER
        value: alpaca
      - key: EXECUTION_MODE
        value: production
      - key: APCA_API_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: DEFAULT_DTE_FILTER
        value: 0dte
      - key: DEFAULT_STRIKE_OFFSET_SHORT
        value: "-5"
      - key: DEFAULT_STRIKE_OFFSET_LONG
        value: "-6"
      - key: DEFAULT_LIMIT_CREDIT
        value: "0.55"
      - key: SPREAD_MODE_ONLY
        value: true
      - key: SPREAD_MIN_CREDIT
        value: "0"  # 0 = off (paper stress / min skip guard)
      - key: SPREAD_MAX_TRADES_PER_DAY
        value: "0"  # 0 = off (no daily entry cap)
      - key: SPREAD_DAILY_LOSS_LIMIT
        value: "0"  # 0 = off (paper — no daily loss block)
      - key: DEFAULT_FILL_MODE
        value: exercise
      - key: PAPER_FORCE_MIN_FILL
        value: true
      - key: AUTO_CHASE_ENTRY_FILL
        value: true
      - key: ENTRY_CHASE_WAIT_SECONDS
        value: "4"
      - key: ENTRY_CHASE_POLL_SECONDS
        value: "1.5"
      - key: ENTRY_CHASE_MAX_ATTEMPTS
        value: "25"
      - key: ENTRY_CHASE_FLOOR_EXTRA_POLLS
        value: "15"
      - key: ENTRY_MIN_CREDIT
        value: "0.01"
      - key: BURST_MAX_COUNT
        value: "10"
      - key: MAX_CONCURRENT_CHASE_TASKS
        value: "2"
      - key: AUTO_CANCEL_CONFLICTING_ORDERS
        value: true
      - key: AUTO_TAKE_PROFIT
        value: true
      - key: TAKE_PROFIT_PCT
        value: "0.4"
      - key: AUTO_STOP_LOSS
        value: true
      - key: STOP_LOSS_MULTIPLIER
        value: "1.5"
      - key: DANGER_ZONE_PCT
        value: "0.01"
      - key: AUTO_CLOSE_ON_WARNING
        value: true
      - key: WARNING_CLOSE_MULTIPLIER
        value: "1.2"
      - key: WARNING_CANCEL_RESTING_EXITS
        value: true
      - key: ALPACA_EXIT_FILL_TIMEOUT
        value: "600"
      - key: ALPACA_EXIT_POLL_SECONDS
        value: "3"
      - key: APCA_API_KEY_ID
        sync: false
      - key: APCA_API_SECRET_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: EMAIL_ENABLED
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        value: shieldinc850@gmail.com
