services:
  - type: web
    name: spy-options-bridge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXECUTION_MODE
        value: sandbox
      - key: TASTYTRADE_API_BASE_URL
        value: https://api.cert.tastyworks.com
      - key: DEFAULT_DTE_FILTER
        value: 0dte
      - key: AUTO_TAKE_PROFIT
        value: true
      - key: TAKE_PROFIT_PCT
        value: "0.50"
      - key: AUTO_STOP_LOSS
        value: true
      - key: STOP_LOSS_MULTIPLIER
        value: "2.0"
      - key: DANGER_ZONE_PCT
        value: "0.01"
      - key: TASTYTRADE_SANDBOX_USERNAME
        sync: false
      - key: TASTYTRADE_SANDBOX_PASSWORD
        sync: false
      - key: TASTYTRADE_ACCOUNT_NUMBER
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
